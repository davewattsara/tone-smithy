# cargo-deny configuration. See: https://embarkstudios.github.io/cargo-deny/
#
# Licence policy follows docs/planning/07-distribution/licensing.md:
# dual MIT/Apache-2.0 core, permissive deps only, GPL-family rejected.

[graph]
all-features = true

[licenses]
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",     # from assert_no_alloc — same family as BSD-2/3, even more permissive
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",          # Boost Software License — permissive; from clipboard-win, error-code (via arboard via egui)
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "OFL-1.1",          # SIL Open Font License — for the default fonts bundled by eframe's `default_fonts` feature
]

# Per-crate exceptions for non-SPDX licence references we accept.
exceptions = [
    # epaint_default_fonts bundles the Ubuntu Font under the Ubuntu Font Licence,
    # which is represented as a LicenseRef (not on the SPDX list). The licence is
    # font-only and permissive for redistribution; accepted for the bundled font use.
    { name = "epaint_default_fonts", allow = ["LicenseRef-UFL-1.0"] },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal crates use `{ path = "..." }` without a version (they are
# `publish = false`); cargo-deny would otherwise treat the implicit `*` version
# as a wildcard. Allow it for path deps only.
allow-wildcard-paths = true

[advisories]
yanked = "warn"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
