# cargo-deny configuration. See: https://embarkstudios.github.io/cargo-deny/
#
# Licence policy follows docs/planning/07-distribution/licensing.md:
# dual MIT/Apache-2.0 core, permissive deps only, GPL-family rejected.

[graph]
all-features = true

[licenses]
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
yanked = "warn"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
