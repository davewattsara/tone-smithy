# Configuration for `cargo about`, which generates THIRD-PARTY-LICENSES.txt
# during `cargo xtask dist`. Install with `cargo install cargo-about`.
#
# `accepted` lists the SPDX license identifiers we allow third-party crates to
# use. If `cargo about generate` fails complaining about an unlisted license,
# review it and add it here if it is acceptable for redistribution.

accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]

# Build the standalone app for its target triple; that's what we ship.
targets = ["x86_64-pc-windows-msvc"]

# Private workspace crates carry no third-party obligations.
ignore-build-dependencies = true
ignore-dev-dependencies = true
