name: Release

# Cuts a release when a v* tag is pushed: builds the Windows installer via
# `cargo xtask dist` and attaches the installer, checksums, and changelog to a
# GitHub Release. Signing is performed only when a certificate secret is set.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  release:
    name: Build installer & publish release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress -y
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Install cargo-about
        run: cargo install cargo-about --locked

      - name: Decode signing certificate
        id: cert
        if: ${{ secrets.TONESMITHY_CERT_BASE64 != '' }}
        env:
          CERT_BASE64: ${{ secrets.TONESMITHY_CERT_BASE64 }}
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "tonesmithy-cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CERT_BASE64))
          echo "TONESMITHY_CERT=$pfx" >> $env:GITHUB_ENV

      - name: Build distribution artefacts
        env:
          # Empty when the secret is unset; signtool signing is skipped then.
          TONESMITHY_CERT_PASSWORD: ${{ secrets.TONESMITHY_CERT_PASSWORD }}
        run: cargo run --release -p xtask -- dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tone Smithy ${{ github.ref_name }}
          body_path: CHANGELOG.md
          fail_on_unmatched_files: true
          files: |
            target/dist/*/tonesmithy-*-windows-x64.exe
            target/dist/*/SHA256SUMS
