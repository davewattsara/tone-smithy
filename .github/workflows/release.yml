name: Release

# Cuts a release when a v* tag is pushed. Each platform builds its own package
# via `cargo xtask dist` (Windows installer, Linux tarball), uploads it as a
# workflow artefact, and a final job collects every package, writes a single
# combined SHA256SUMS, and publishes one GitHub Release. Windows signing runs
# only when the certificate secret is set.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build ${{ matrix.os }} package
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other platforms if one fails — easier to diagnose.
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      # cpal/eframe need ALSA + display headers on Linux to build (same set the
      # CI lint job uses).
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libxkbcommon-dev libwayland-dev

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: |
          choco install innosetup --no-progress -y
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Install cargo-about
        run: cargo install cargo-about --locked

      - name: Decode signing certificate
        # Windows only. The `secrets` context isn't allowed in `if:` conditions,
        # so the cert gating is done inside the script: no secret -> no-op and
        # the dist step leaves the build unsigned.
        if: runner.os == 'Windows'
        env:
          CERT_BASE64: ${{ secrets.TONESMITHY_CERT_BASE64 }}
        run: |
          if (-not $env:CERT_BASE64) {
            Write-Host "No TONESMITHY_CERT_BASE64 secret set; building unsigned."
            exit 0
          }
          $pfx = Join-Path $env:RUNNER_TEMP "tonesmithy-cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CERT_BASE64))
          echo "TONESMITHY_CERT=$pfx" >> $env:GITHUB_ENV

      - name: Build distribution artefacts
        env:
          # Empty when the secret is unset; signtool signing is skipped then.
          TONESMITHY_CERT_PASSWORD: ${{ secrets.TONESMITHY_CERT_PASSWORD }}
        run: cargo run --release -p xtask -- dist

      - name: Upload package artefact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          # Each runner produces only its own package; the non-matching globs
          # find nothing and are ignored.
          path: |
            target/dist/*/tonesmithy-*-windows-x64.exe
            target/dist/*/tonesmithy-*-linux-x64.tar.gz
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all package artefacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect packages and write combined SHA256SUMS
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name 'tonesmithy-*-windows-x64.exe' -o \
            -name 'tonesmithy-*-linux-x64.tar.gz' -o \
            -name 'tonesmithy-*-macos*.dmg' \
          \) -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS
          echo "Release assets:"
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tone Smithy ${{ github.ref_name }}
          body_path: CHANGELOG.md
          fail_on_unmatched_files: true
          files: |
            release/*
