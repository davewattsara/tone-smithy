name: Release

# Cuts a release when a v* tag is pushed. Each platform builds its own package
# via `cargo xtask dist` (Windows installer, Linux tarball, macOS dmg), uploads
# it as a workflow artefact, and a final job collects every package, writes a
# single combined SHA256SUMS, and publishes one GitHub Release. Windows and
# macOS signing/notarization run only when their certificate secrets are set.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build ${{ matrix.os }} package
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other platforms if one fails — easier to diagnose.
      fail-fast: false
      matrix:
        # macos-latest is Apple Silicon (arm64).
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      # cpal/eframe need ALSA + display headers on Linux to build (same set the
      # CI lint job uses).
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libxkbcommon-dev libwayland-dev

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: |
          choco install innosetup --no-progress -y
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Install cargo-about
        run: cargo install cargo-about --locked

      - name: Decode signing certificate
        # Windows only. The `secrets` context isn't allowed in `if:` conditions,
        # so the cert gating is done inside the script: no secret -> no-op and
        # the dist step leaves the build unsigned.
        if: runner.os == 'Windows'
        env:
          CERT_BASE64: ${{ secrets.TONESMITHY_CERT_BASE64 }}
        run: |
          if (-not $env:CERT_BASE64) {
            Write-Host "No TONESMITHY_CERT_BASE64 secret set; building unsigned."
            exit 0
          }
          $pfx = Join-Path $env:RUNNER_TEMP "tonesmithy-cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CERT_BASE64))
          echo "TONESMITHY_CERT=$pfx" >> $env:GITHUB_ENV

      - name: Import macOS signing certificate
        # macOS only. Like the Windows path, the secret gating is done inside the
        # script (the `secrets` context isn't allowed in `if:`): no cert -> no-op
        # and the dist step leaves the bundle unsigned/unnotarized.
        if: runner.os == 'macOS'
        env:
          CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$CERT_BASE64" ]; then
            echo "No APPLE_CERT_BASE64 secret set; building unsigned."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/tonesmithy.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          CERT_PATH="$RUNNER_TEMP/apple-cert.p12"
          echo "$CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          # Add the temp keychain to the search list so codesign can find the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          echo "APPLE_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Build distribution artefacts
        env:
          # Empty when the secret is unset; signtool signing is skipped then.
          TONESMITHY_CERT_PASSWORD: ${{ secrets.TONESMITHY_CERT_PASSWORD }}
          # macOS notarization. Empty when unset; xtask skips notarization then.
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
        run: cargo run --release -p xtask -- dist

      - name: Upload package artefact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          # Each runner produces only its own package; the non-matching globs
          # find nothing and are ignored.
          path: |
            target/dist/*/tonesmithy-*-windows-x64.exe
            target/dist/*/tonesmithy-*-linux-x64.tar.gz
            target/dist/*/tonesmithy-*-macos.dmg
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs: build
    # Run once every build job has finished, even if some failed, so a single
    # platform's packaging error can't block publishing the others. `!cancelled()`
    # still skips the job if the run was cancelled. The collect step below fails
    # only when *no* platform produced a package.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all package artefacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect packages and write combined SHA256SUMS
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name 'tonesmithy-*-windows-x64.exe' -o \
            -name 'tonesmithy-*-linux-x64.tar.gz' -o \
            -name 'tonesmithy-*-macos*.dmg' \
          \) -exec cp {} release/ \;
          cd release
          # Publish whatever platforms succeeded, but fail loudly if none did
          # (otherwise we'd publish an empty release).
          if [ -z "$(ls -A)" ]; then
            echo "No platform packages were produced — nothing to publish."
            exit 1
          fi
          sha256sum * > SHA256SUMS
          echo "Release assets:"
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tone Smithy ${{ github.ref_name }}
          body_path: CHANGELOG.md
          fail_on_unmatched_files: true
          files: |
            release/*
